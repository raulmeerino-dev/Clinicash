workflows:
  ios_ipa:
    name: iOS IPA Build (AltStore)
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: com.raulmeerino.clinicash

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true

    scripts:
      - name: Flutter dependencies
        script: |
          flutter pub get

      - name: Build iOS app without code signing
        script: |
          flutter build ios --release --no-codesign

      - name: Package unsigned IPA for AltStore
        script: |
          mkdir -p build/ios/ipa/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r clinicash-unsigned.ipa Payload

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
