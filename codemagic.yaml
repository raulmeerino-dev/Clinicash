workflows:
  ios_ipa:
    name: iOS IPA Build
    instance_type: mac_mini_m2
    max_build_duration: 60

    integrations:
      app_store_connect: codemagic

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.example.odontologiaApp
      vars:
        BUNDLE_ID: com.example.odontologiaApp

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true

    scripts:
      - name: Flutter dependencies
        script: |
          flutter pub get

      - name: Set up iOS signing
        script: |
          xcode-project use-profiles

      - name: Build IPA
        script: |
          flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
